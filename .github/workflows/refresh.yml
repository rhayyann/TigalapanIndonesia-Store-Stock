name: MokaSync Refresh
on:
  schedule:
    - cron: "*/5 9-21 * * *"
  workflow_dispatch: {}
concurrency:
  group: mokasync-refresh
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    # Dinaikkan dari 8 -> 10 menit. Ini buffer secukupnya untuk
    # concurrency-limiting + retry di refresh.js (yang bikin durasi tiap
    # run sedikit lebih lama dari sebelumnya). SENGAJA tidak dinaikkan
    # jauh lebih tinggi (mis. 15-20 menit) -- karena job yang terlalu lama
    # menahan slot "concurrency: mokasync-refresh" bikin run berikutnya
    # yang keburu antre lebih berisiko dibatalkan kalau ada run KETIGA
    # yang menyusul sebelum sempat jalan. Pantau kolom DurasiTotalDetik
    # di TriggerLog -- kalau sering mepet ke 10 menit, turunkan
    # OUTLET_CONCURRENCY di refresh.js, JANGAN menaikkan timeout ini lagi.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node refresh.js
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          MOKA_CLIENT_ID: ${{ secrets.MOKA_CLIENT_ID }}
          MOKA_CLIENT_SECRET: ${{ secrets.MOKA_CLIENT_SECRET }}
          MOKA_REFRESH_TOKEN: ${{ secrets.MOKA_REFRESH_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
